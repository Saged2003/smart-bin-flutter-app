name: smart_bin_eng
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  flutter_map: ^6.1.0 
  latlong2: ^0.9.1
  mobile_scanner: ^5.1.1
  connectivity_plus: ^5.0.2
  image_picker: ^1.0.7
  http_parser: ^4.0.2
  geolocator: ^11.0.1
  geocoding: ^3.0.0
  lottie: ^3.3.3
  shimmer: ^3.0.0 
  provider: ^6.1.2
  easy_localization: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/
    - lib/assets/animations/
    - lib/assets/translations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/images/app_logo.png"